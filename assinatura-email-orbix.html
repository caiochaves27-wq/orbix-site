    <script>
      async function copyOrbixSignature() {
        const signature = document.getElementById("orbix-signature");
        const status = document.getElementById("copy-status");
        const html = signature.outerHTML;
        const text = signature.innerText;

        try {
          if (navigator.clipboard && window.ClipboardItem) {
            await navigator.clipboard.write([
              new ClipboardItem({
                "text/html": new Blob([html], { type: "text/html" }),
                "text/plain": new Blob([text], { type: "text/plain" }),
              }),
            ]);
          } else {
            const range = document.createRange();
            range.selectNode(signature);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            document.execCommand("copy");
            selection.removeAllRanges();
          }

          status.textContent = "Copiado. Agora cole no Outlook com Ctrl + V.";
        } catch (error) {
          status.textContent = "Nao foi possivel copiar automaticamente. Selecione a assinatura e use Ctrl + C.";
        }
      }
    </script>
